name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          . backend/.venv/bin/activate
          pip install -r backend/requirements-dev.txt
      - name: Backend tests
        run: |
          . backend/.venv/bin/activate
          cd backend
          PYTHONPATH=. pytest -q
